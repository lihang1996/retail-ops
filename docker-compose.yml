services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-retail_ops}
      MYSQL_USER: ${DB_USER:-retail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-retail123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PUBLISH_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    build:
      context: ..
      dockerfile: retail-ops/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-retail}
      DB_PASSWORD: ${DB_PASSWORD:-retail123}
      DB_NAME: ${DB_NAME:-retail_ops}
      JWT_SECRET: ${JWT_SECRET:-retail-ops-change-me-in-prod}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  mysql_data:
